<!DOCTYPE html>
<html lang="en">
<head>
    <title>Payment Modal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="buynow.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Trigger Button -->
    <div class="text-center mt-5">
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#paymentModal">
            Buy Now
        </button>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="paymentModal" tabindex="-1" aria-labelledby="paymentModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="paymentModalLabel">Payment Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="container">
              <div class="row">
                <div class="col-md-6">
                  <h2>BILLING ADDRESS</h2>
                  <form>
                    Full name
                    <input type="text" class="form-control mb-2" placeholder="Enter name">
                    Email
                    <input type="text" class="form-control mb-2" placeholder="Enter email">
                    Address
                    <input type="text" class="form-control mb-2" placeholder="Enter address">
                    City
                    <input type="text" class="form-control mb-2" placeholder="Enter city">
                    <div class="row">
                      <div class="col">
                        State
                        <select class="form-select mb-2">
                          <option>Choose State..</option>
                          <option>Andhra Pradesh</option>
                          <option>Arunachal Pradesh</option>
                          <option>Assam</option>
                          <option>Bihar</option>
                          <option>Chhattisgarh</option>
                          <option>Goa</option>
                          <option>Gujarat</option>
                          <option>Haryana</option>
                          <option>Punjab</option>
                          <option>Uttar Pradesh</option>
                        </select>
                      </div>
                      <div class="col">
                        Zip Code
                        <input type="number" class="form-control mb-2" placeholder="Zip code">
                      </div>
                    </div>
                  </form>
                </div>
                <div class="col-md-6">
                  <h3>PAYMENT</h3>
                  <form>
                    Accepted Card<br>
                    <img src="./images/visa.jpg" width="50">
                    <img src="./images/MasterCard.jpg" width="50">
                    <img src="./images/rupay.jpg" width="50">
                    <br><br>
                    Credit/Debit Card number
                    <input type="text" class="form-control mb-2" placeholder="Enter card number">
                    Exp month
                    <input type="text" class="form-control mb-2" placeholder="Enter month">
                    <div class="row">
                      <div class="col">
                        Exp year
                        <select class="form-select mb-2">
                          <option>Choose Year..</option>
                          <option>2024</option>
                          <option>2025</option>
                          <option>2026</option>
                          <option>2027</option>
                        </select>
                      </div>
                      <div class="col">
                        CVV
                        <input type="number" class="form-control mb-2" placeholder="CVV">
                      </div>
                    </div>
                  </form>
                  <button type="button" class="btn btn-success mt-3">Proceed to Checkout</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
